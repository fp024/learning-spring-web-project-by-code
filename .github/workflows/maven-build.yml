# This workflow will build a package using Maven and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#apache-maven-with-a-settings-path

name: Maven Build Test

on:
  push:
    branches: [ master ]
    paths:
      - 'part-last/my-board-spring5/**'
      - 'part-last/my-board/**'
      - '.github/workflows/maven-build.yml'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      my-board-spring5: ${{ steps.filter.outputs.my-board-spring5 }}
      my-board: ${{ steps.filter.outputs.my-board }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          my-board-spring5:
            - 'part-last/my-board-spring5/**'
          my-board:
            - 'part-last/my-board/**'
          workflow:
            - '.github/workflows/maven-build.yml'

  build-my-board-spring5-java17:
    needs: detect-changes
    if: needs.detect-changes.outputs.my-board-spring5 == 'true' || needs.detect-changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:                
        distribution: 'temurin'
        java-version: '17'
        cache: 'maven'

    - name: Build with Maven (my-board-spring5 with Java 17)
      run: mvn -B clean test --file part-last/my-board-spring5/pom.xml

  build-my-board-java21:
    needs: detect-changes
    if: needs.detect-changes.outputs.my-board == 'true' || needs.detect-changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:                
        distribution: 'temurin'
        java-version: '21'
        cache: 'maven'

    - name: Build with Maven (my-board with Java 21)
      run: mvn -B clean test --file part-last/my-board/pom.xml
